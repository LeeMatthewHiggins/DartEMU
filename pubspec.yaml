name: dart_emu
description: >-
  A RISC-V system emulator (RV64 and RV32) ported from TinyEMU. Boots Linux
  with stream-based I/O for CLI, Flutter, and web applications.
version: 0.3.0
repository: https://github.com/LeeMatthewHiggins/DartEMU
topics:
  - emulator
  - riscv
  - virtual-machine

environment:
  sdk: ^3.9.0

dependencies:
  args: ^2.6.0
  mason_logger: ^0.3.1
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^7.0.0
  vm_service: ^15.2.0

executables:
  dart_emu:
